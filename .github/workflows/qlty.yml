name: Qlty Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  qlty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Qlty
        uses: qltysh/qlty-action@v1
        with:
          token: ${{ secrets.QLTY_TOKEN }}